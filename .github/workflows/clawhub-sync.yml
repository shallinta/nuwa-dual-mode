name: Sync to ClawHub

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  sync:
    uses: openclaw/clawhub/.github/workflows/skill-publish.yml@main
    with:
      dry_run: false
      owner: shallinta
    secrets:
      CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
